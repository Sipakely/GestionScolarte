<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un matière</title>
</head>
<body>
    <h2>Modifier matière</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="nom" value="{{ matiere.nom }}"><br>
        <input type="number" name="coefficient" value="{{ matiere.coefficient }}"><br>

        <select name="etudiant">
            {% for etudiant in etudiants %}
                <option value="{{ etudiant.id }}"
                    {% if etudiant.id == matiere.etudiant.id %}selected{% endif %}>
                    {{ etudiant.nom }} {{ etudiant.prenom }}
                </option>
            {% endfor %}
        </select>

     <button type="submit">Modifier</button>
    </form>
</body>
</html>
