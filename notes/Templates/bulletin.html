<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin</title>
</head>
<body>
    <h2>Bulletin de {{ etudiant.nom }}</h2>

    <ul>
        {% for note in notes %}
            <li>{{ note.matiere }} : {{ note.valeur }}</li>
        {% endfor %}
    </ul>

    <h3>Moyenne : {{ moyenne }}</h3>
</body>
</html>
