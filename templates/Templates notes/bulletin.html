<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin</title>
</head>
<body>
    {% extends 'base.html' %}

    {% block content %}

    <h2>Bulletin</h2>

    <form method="get">
        <select name="etudiant">
            {% for etudiant in etudiants %}
                <option value="{{ etudiant.id }}">{{ etudiant.nom }}</option>
            {% endfor %}
        </select>
        <button type="submit">Afficher</button>
    </form>

    {% if notes %}
    <table>
        <tr>
            <th>Matière</th>
            <th>Note</th>
        </tr>

        {% for note in notes %}
        <tr>
            <td>{{ note.matiere.nom }}</td>
            <td>{{ note.valeur }}</td>
        </tr>
        {% endfor %}
    </table>

    <h3>Moyenne : {{ moyenne }}</h3>

    {% endif %}

    {% endblock %}
</body>
</html>
