<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin</title>
</head>
<body>
   {% extends 'base.html' %}

    {% block content %}

    <h2>Bulletin de {{ etudiant.nom }}</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Matière</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody>
            {% for note in notes %}
            <tr>
                <td>{{ note.matiere.nom }}</td>
                <td>{{ note.valeur }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">Aucune note disponible</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

<h3>Moyenne : {{ moyenne }}</h3>

{% endblock %}
</body>
</html>
