<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des notes </title>
</head>
<body>
    {% extends 'base.html' %}

{% block title %}Notes{% endblock %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h4 class="mb-3">Liste des notes</h4>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Étudiant</th>
                    <th>Matière</th>
                    <th>Note</th>
                </tr>
            </thead>

            <tbody>
                {% for note in notes %}
                <tr>
                    <td>{{ note.etudiant.nom }}</td>
                    <td>{{ note.matiere.nom }}</td>
                    <td>{{ note.valeur }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
</body>
</html>
