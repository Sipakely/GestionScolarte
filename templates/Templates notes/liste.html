{% extends "base.html" %}

{% block content %}

<div class="card-pro">
  <h4>Notes</h4>

  <table class="table">
    {% for n in notes %}
    <tr>
      <td>{{ n.etudiant }}</td>
      <td>{{ n.matiere }}</td>
      <td>{{ n.valeur }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">Aucune note disponible</td>
    </tr>
    {% endfor %}
  </table>
</div>

{% endblock %}
