<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des notes </title>
</head>
<body>
    {% extends 'base.html' %}

    {% block content %}

    <h2>Liste des notes</h2>

    <a href="/notes/ajouter/">Ajouter</a>

    <table>
        <tr>
            <th>Étudiant</th>
            <th>Matière</th>
            <th>Note</th>
        </tr>

        {% for note in notes %}
        <tr>
            <td>{{ note.etudiant.nom }}</td>
            <td>{{ note.matiere.nom }}</td>
            <td>{{ note.valeur }}</td>
        </tr>
        {% endfor %}

    </table>

    {% endblock %}
</body>
</html>
