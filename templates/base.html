<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Scolarité</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ton CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width: 250px; height: 100vh;">
        <h4 class="text-center">🎓 GS</h4>
        <hr>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link text-white" href="/">📊 Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="/etudiants/">👨‍🎓 Étudiants</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="/matieres/">📚 Matières</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white" href="/notes/">📝 Notes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-danger" href="/logout/">🚪 Déconnexion</a>
            </li>
        </ul>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4">

        <!-- Header -->
        <div class="mb-4">
            <h2>{% block title %}Dashboard{% endblock %}</h2>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Content -->
        {% block content %}
        {% endblock %}

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
