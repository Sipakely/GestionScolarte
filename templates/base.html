<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion Scolarité</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      background: #F8F6F1;
      font-family: Inter, sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      width: 70px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: white;
      border-right: 1px solid #eee;
      transition: 0.3s;
      overflow: hidden;
    }

    .sidebar:hover {
      width: 230px;
    }

    .logo {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      color: #B89B5E;
      padding: 20px;
      text-align: center;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 18px;
      color: #1C1C1C;
      text-decoration: none;
      white-space: nowrap;
      transition: 0.2s;
    }

    .sidebar-link i {
      width: 30px;
      text-align: center;
    }

    .sidebar .text {
      opacity: 0;
      transition: 0.2s;
    }

    .sidebar:hover .text {
      opacity: 1;
    }

    .sidebar-link:hover {
      background: #F8F6F1;
      border-radius: 10px;
    }

    /* CONTENT */
    .content {
      margin-left: 80px;
      padding: 20px;
    }

    /* CARDS */
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* TOPBAR */
    .topbar {
      background: white;
      padding: 12px 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">GS</div>

  <a href="#" class="sidebar-link">
    <i class="bi bi-house-door"></i>
    <span class="text">Dashboard</span>
  </a>

  <a href="#" class="sidebar-link">
    <i class="bi bi-book"></i>
    <span class="text">Matières</span>
  </a>

  <a href="#" class="sidebar-link">
    <i class="bi bi-person"></i>
    <span class="text">Étudiants</span>
  </a>

  <a href="#" class="sidebar-link">
    <i class="bi bi-graph-up"></i>
    <span class="text">Notes</span>
  </a>

</div>

<!-- CONTENT -->
<div class="content">

  {% block content %}
  {% endblock %}

</div>

</body>
</html>
