<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scholaria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #F6F7FB;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial;
        }

        .box {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
        }

        h1 {
            color: #2C2C2C;
        }

        p {
            color: #8A8A8A;
        }

        .btn-custom {
            background: #B89B5E;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .btn-custom:hover {
            background: #D6C08E;
            color: white;
        }
    </style>
</head>

<body>

<div class="box">

    {% load static %}
    <img src="{% static 'images/logo.png' %}" class="logo">

    <h1>Scholaria</h1>
    <p>Simplifier la gestion scolaire</p>

    <!-- Bouton Se connecter -->
    <a href="{% url 'login' %}" class="btn-custom">
        Se connecter
    </a>

    <!-- Bouton S'inscrire -->
    <br>
        <a href="{% url 'signup' %}" class="btn-custom" style="background:#2C2C2C; margin-top:10px;">
            S'inscrire
        </a>
    </div>

</body>
</html>
