<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    {% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body">

                <h4 class="mb-4 text-center">Connexion</h4>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" name="nom" class="form-control" placeholder="Entrez votre nom" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Entrez votre email" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Se connecter
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
</body>
</html>
