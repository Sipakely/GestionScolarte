{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}

<div class="login-box">

  <h3 class="mb-3">Connexion</h3>

  <form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Nom d'utilisateur" class="form-control mb-2">

    <input type="password" name="password" placeholder="Mot de passe" class="form-control mb-3">

    <button class="btn btn-dark w-100">Se connecter</button>
  </form>

</div>

{% endblock %}
