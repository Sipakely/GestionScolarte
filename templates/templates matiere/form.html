{% extends "base.html" %}

{% block title %}{{ page_title|default:"Ajout Matière" }}{% endblock %}

{% block content %}

<h3 class="form-title">{{ page_title|default:"Ajouter une matière" }}</h3>

{% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}">
        {{ message }}
    </div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Nom de la matière</label>
        <input type="text" name="nom" class="form-control" value="{{ form.nom.value|default:'' }}" required>
    </div>

    <div class="mb-3">
        <label>Coefficient</label>
        <input type="number" name="coefficient" class="form-control" value="{{ form.coefficient.value|default:'' }}" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        {{ submit_label|default:"Enregistrer" }}
    </button>
</form>

{% endblock %}
