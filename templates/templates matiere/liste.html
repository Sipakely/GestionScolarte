<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des matieres </title>
</head>
<body>
    {% extends 'base.html' %}

{% block title %}Matières{% endblock %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h4 class="mb-3">Liste des matières</h4>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Nom</th>
                    <th>Coefficient</th>
                </tr>
            </thead>

            <tbody>
                {% for matiere in matieres %}
                <tr>
                    <td>{{ matiere.nom }}</td>
                    <td>{{ matiere.coefficient }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

{% endblock %}
</body>
</html>
