<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des matieres </title>
</head>
<body>
    {% extends "base.html" %}
{% block content %}

<div class="card-pro">
  <h4>Matières</h4>
  <a href="{% url 'matieres:ajouter' %}" class="btn btn-dark btn-sm">Ajouter</a>

  <table class="table mt-3">
    {% for m in matieres %}
    <tr>
      <td>{{ m.nom }}</td>
      <td>
        <a href="{% url 'matieres:modifier' m.id %}" class="btn btn-warning btn-sm">Edit</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="2" class="text-muted">Aucune matière enregistrée</td>
    </tr>
    {% endfor %}
  </table>
</div>

{% endblock %}
</body>
</html>
